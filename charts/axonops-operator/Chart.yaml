apiVersion: v2
name: axonops-operator
description: Kubernetes operator for managing the AxonOps observability stack (server, dashboard, storage, alerts, backups, Kafka)
type: application

version: 0.1.0
appVersion: "0.1.0"

home: https://axonops.com
sources:
  - https://github.com/axonops/axonops-operator
maintainers:
  - name: AxonOps
    email: support@axonops.com
    url: https://axonops.com
icon: https://digitalis-marketplace-assets.s3.us-east-1.amazonaws.com/axonops-small-logo.png

keywords:
  - kubernetes
  - operator
  - axonops
  - cassandra
  - observability
  - monitoring
  - kafka
  - alerts
  - backups

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Full Lifecycle
  artifacthub.io/crds: |
    - kind: AxonOpsServer
      version: v1alpha1
      name: axonopsservers.core.axonops.com
      description: Deploys the AxonOps server stack (server, dashboard, timeseries DB, search)
    - kind: AxonOpsConnection
      version: v1alpha1
      name: axonopsconnections.core.axonops.com
      description: Shared API authentication configuration
    - kind: AxonOpsMetricAlert
      version: v1alpha1
      name: axonopsmetricalerts.alerts.axonops.com
      description: Metric threshold alert rules
    - kind: AxonOpsLogAlert
      version: v1alpha1
      name: axonopslogalerts.alerts.axonops.com
      description: Log pattern alert rules
    - kind: AxonOpsAlertRoute
      version: v1alpha1
      name: axonopsalertroutes.alerts.axonops.com
      description: Alert routing and notification channel configuration
    - kind: AxonOpsAlertEndpoint
      version: v1alpha1
      name: axonopsalertendpoints.alerts.axonops.com
      description: Alert notification endpoints (email, Slack, PagerDuty, etc.)
    - kind: AxonOpsHealthcheckHTTP
      version: v1alpha1
      name: axonopshealthcheckhttps.alerts.axonops.com
      description: HTTP endpoint healthchecks
    - kind: AxonOpsHealthcheckTCP
      version: v1alpha1
      name: axonopshealthchecktcps.alerts.axonops.com
      description: TCP port healthchecks
    - kind: AxonOpsHealthcheckShell
      version: v1alpha1
      name: axonopshealthcheckshells.alerts.axonops.com
      description: Shell script healthchecks
    - kind: AxonOpsDashboardTemplate
      version: v1alpha1
      name: axonopsdashboardtemplates.alerts.axonops.com
      description: Declarative dashboard management
    - kind: AxonOpsAdaptiveRepair
      version: v1alpha1
      name: axonopsadaptiverepairs.alerts.axonops.com
      description: Adaptive repair scheduling
    - kind: AxonOpsScheduledRepair
      version: v1alpha1
      name: axonopsscheduledrepairs.alerts.axonops.com
      description: Cron-based scheduled repair management
    - kind: AxonOpsCommitlogArchive
      version: v1alpha1
      name: axonopscommitlogarchives.alerts.axonops.com
      description: Commitlog archive settings
    - kind: AxonOpsSilenceWindow
      version: v1alpha1
      name: axonopssilencewindows.alerts.axonops.com
      description: Alert silence windows
    - kind: AxonOpsLogCollector
      version: v1alpha1
      name: axonopslogcollectors.alerts.axonops.com
      description: Log collector configuration
    - kind: AxonOpsBackup
      version: v1alpha1
      name: axonopsbackups.backups.axonops.com
      description: Cassandra scheduled snapshot backups (S3/SFTP/Azure)
    - kind: AxonOpsKafkaTopic
      version: v1alpha1
      name: axonopskafkatopics.kafka.axonops.com
      description: Kafka topic lifecycle management
    - kind: AxonOpsKafkaACL
      version: v1alpha1
      name: axonopskafkaacls.kafka.axonops.com
      description: Kafka ACL entry management
    - kind: AxonOpsKafkaConnector
      version: v1alpha1
      name: axonopskafkaconnectors.kafka.axonops.com
      description: Kafka Connect connector management
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.axonops.com
    - name: Source
      url: https://github.com/axonops/axonops-operator
    - name: Container Image
      url: https://github.com/axonops/axonops-operator/pkgs/container/axonops-operator
