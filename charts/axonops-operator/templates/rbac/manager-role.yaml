  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cert-manager.io
  resources:
  - clusterissuers
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.axonops.com
  resources:
  - axonopsconnections
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.axonops.com
  resources:
  - axonopsservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
