  - update
- apiGroups:
  - alerts.axonops.com
  resources:
  - axonopsadaptiverepairs/status
  - axonopsalertendpoints/status
  - axonopsalertroutes/status
  - axonopscommitlogarchives/status
  - axonopsdashboardtemplates/status
  - axonopshealthcheckhttps/status
  - axonopshealthcheckshells/status
  - axonopshealthchecktcps/status
  - axonopslogalerts/status
  - axonopsmetricalerts/status
  - axonopsscheduledrepairs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - backups.axonops.com
