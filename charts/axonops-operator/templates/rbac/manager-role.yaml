apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "axonops-operator.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - alerts.axonops.com
  resources:
  - axonopsadaptiverepairs
  - axonopsalertendpoints
  - axonopsalertroutes
  - axonopscommitlogarchives
  - axonopsdashboardtemplates
  - axonopshealthcheckhttps
  - axonopshealthcheckshells
  - axonopshealthchecktcps
  - axonopslogalerts
  - axonopsmetricalerts
  - axonopsscheduledrepairs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - alerts.axonops.com
  resources:
  - axonopsadaptiverepairs/finalizers
  - axonopsalertendpoints/finalizers
  - axonopsalertroutes/finalizers
  - axonopscommitlogarchives/finalizers
  - axonopsdashboardtemplates/finalizers
  - axonopshealthcheckhttps/finalizers
  - axonopshealthcheckshells/finalizers
  - axonopshealthchecktcps/finalizers
  - axonopslogalerts/finalizers
  - axonopsmetricalerts/finalizers
  - axonopsscheduledrepairs/finalizers
