  name: graph-query-latency
  operator: ">"
  warningValue: 100
  criticalValue: 500
  duration: 15m
  dashboard: DSE Graph
  chart: Query Latency (p95)
  annotations:
    summary: "DSE graph query latency is high"
    description: "Graph queries are slow"
  filters:
    groupBy:
      - query_type

---
# Example 8: Multi-cluster without connectionRef (using env vars fallback)
# This alert will use AXONOPS_* environment variables for connection
apiVersion: alerts.axonops.com/v1alpha1
kind: AxonOpsMetricAlert
metadata:
  name: cassandra-gc-time
  namespace: default
spec:
  # No connectionRef specified - will use env vars (AXONOPS_API_KEY, AXONOPS_ORG_ID, etc.)
  clusterName: staging-cassandra
  clusterType: cassandra
  name: high-gc-time
  operator: ">"
  warningValue: 200
  criticalValue: 500
  duration: 10m
  dashboard: Cassandra Overview
  chart: GC Time
  annotations:
    summary: "Cassandra garbage collection time is high"
    description: "GC pause times exceeded threshold"
