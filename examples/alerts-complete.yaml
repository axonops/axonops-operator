---
# Example 5: Kafka - High Consumer Lag Alert
apiVersion: alerts.axonops.com/v1alpha1
kind: AxonOpsMetricAlert
metadata:
  name: kafka-high-consumer-lag
  namespace: default
spec:
  connectionRef: production
  clusterName: production-kafka
  clusterType: kafka
  name: high-consumer-lag
  operator: ">"
  warningValue: 10000
  criticalValue: 50000
  duration: 5m
  dashboard: Kafka Overview
  chart: Consumer Lag
  annotations:
    summary: "Kafka consumer lag is high"
    description: "Consumer group {{ $labels.group_id }} is lagging"
  filters:
    topic:
      - events
      - transactions
    groupBy:
      - topic
      - group_id

