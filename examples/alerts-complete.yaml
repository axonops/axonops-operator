# Complete examples of AxonOpsMetricAlert configurations
# These examples demonstrate various alert patterns and use cases

---
# Prerequisites: Create the AxonOpsConnection and Secret
apiVersion: v1
kind: Secret
metadata:
  name: axonops-prod-creds
  namespace: default
type: Opaque
stringData:
  api_key: "change-me-to-your-api-key"

---
apiVersion: core.axonops.com/v1alpha1
kind: AxonOpsConnection
metadata:
  name: production
  namespace: default
spec:
  orgId: my-org
  apiKeyRef:
    name: axonops-prod-creds
    key: api_key
  host: dash.axonops.cloud
  protocol: https
  tokenType: Bearer

---
# Example 1: Cassandra - High Read Latency Alert
apiVersion: alerts.axonops.com/v1alpha1
kind: AxonOpsMetricAlert
metadata:
  name: cassandra-high-read-latency
  namespace: default
spec:
  connectionRef: production
  clusterName: production-cassandra
  clusterType: cassandra
  name: high-read-latency
  operator: ">"
  warningValue: 50
  criticalValue: 100
  duration: 15m
  dashboard: Cassandra Overview
  chart: Read Latency (p99)
  annotations:
    summary: "Cassandra read latency is high"
    description: "Read p99 latency exceeded threshold on {{ $labels.host_id }}"
  integrations:
    - type: email
      routing:
        - dba-team@example.com
      overrideWarning: true
  filters:
    dc:
      - us-east-1a
      - us-east-1b
    groupBy:
      - dc
      - host_id

---
# Example 2: Cassandra - High Write Latency Alert
apiVersion: alerts.axonops.com/v1alpha1
kind: AxonOpsMetricAlert
metadata:
  name: cassandra-high-write-latency
  namespace: default
spec:
  connectionRef: production
  clusterName: production-cassandra
  clusterType: cassandra
  name: high-write-latency
  operator: ">"
  warningValue: 30
  criticalValue: 75
  duration: 10m
  dashboard: Cassandra Overview
  chart: Write Latency (p99)
  annotations:
    summary: "Cassandra write latency is elevated"
    description: "Write p99 latency is above threshold"
  integrations:
    - type: email
      routing:
        - dba-team@example.com
      overrideWarning: true
      overrideError: true

---
# Example 3: Cassandra - CPU Usage Alert
apiVersion: alerts.axonops.com/v1alpha1
kind: AxonOpsMetricAlert
metadata:
  name: cassandra-high-cpu
  namespace: default
spec:
  connectionRef: production
  clusterName: production-cassandra
  clusterType: cassandra
  name: high-cpu-usage
  operator: ">"
  warningValue: 70
  criticalValue: 90
  duration: 5m
  dashboard: Cassandra Overview
  chart: CPU Usage
  annotations:
    summary: "Cassandra node CPU is high"
    description: "CPU usage exceeded threshold"
  filters:
    hostId:
      - node-1
      - node-2
      - node-3
    groupBy:
      - host_id

