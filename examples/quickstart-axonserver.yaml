# quickstart-axonserver.yaml - Minimal AxonOpsPlatform with external databases
# Use this as a starting point when Cassandra and Elasticsearch/OpenSearch are
# managed outside the operator. The server and dashboard are operator-managed;
# timeSeries and search connect to pre-existing clusters.
#
# Apply with:
#   kubectl apply -f examples/quickstart-axonserver.yaml
apiVersion: core.axonops.com/v1alpha1
kind: AxonOpsPlatform
metadata:
  name: axonops
  namespace: default
spec:
  server:
    orgName: "my-organisation"

  timeSeries: {}
  search: {}
  dashboard: {}
