# AxonOps HTTP healthchecks — safe to kubectl delete -f this file.
# Requires quickstart-internal-connection.yaml to be applied first.
# kubectl apply -f examples/quickstart-internal-http.yaml
# kubectl delete -f examples/quickstart-internal-http.yaml

---
apiVersion: alerts.axonops.com/v1alpha1
kind: AxonOpsHealthcheckHTTP
metadata:
  name: cassandra-health-http
  namespace: default
spec:
  connectionRef: example
  clusterName: test-cluster-000
  clusterType: cassandra
  name: "Cassandra Node HTTP Health Check"
  url: "http://localhost:8080/health"
  method: "GET"
  expectedStatus: 200
  interval: "1m"
  timeout: "30s"
  readonly: false

---
apiVersion: alerts.axonops.com/v1alpha1
kind: AxonOpsHealthcheckHTTP
metadata:
  name: cassandra-jolokia-http
  namespace: default
spec:
  connectionRef: example
  clusterName: test-cluster-000
  clusterType: cassandra
  name: "Cassandra Jolokia HTTP Check"
  url: "http://localhost:8778/jolokia/version"
  method: "GET"
  expectedStatus: 200
  interval: "2m"
  timeout: "30s"
  readonly: true

---
apiVersion: alerts.axonops.com/v1alpha1
kind: AxonOpsHealthcheckHTTP
metadata:
  name: api-health-post-check
  namespace: default
spec:
  connectionRef: example
  clusterName: test-cluster-000
  clusterType: cassandra
  name: "API Health POST Check"
  url: "http://api.example.com/healthz"
  method: "POST"
  headers:
    Content-Type: "application/json"
    Authorization: "Bearer token"
  body: '{"check": "status"}'
  expectedStatus: 200
  interval: "5m"
  timeout: "1m"
  readonly: false
