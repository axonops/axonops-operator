{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: axonopslogalerts.alerts.axonops.com
spec:
  group: alerts.axonops.com
  names:
    kind: AxonOpsLogAlert
    listKind: AxonOpsLogAlertList
    plural: axonopslogalerts
    singular: axonopslogalert
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterName
      name: Cluster
      type: string
    - jsonPath: .spec.clusterType
      name: Type
      type: string
    - jsonPath: .status.syncedAlertID
      name: AlertID
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AxonOpsLogAlert is the Schema for the axonopslogalerts API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of AxonOpsLogAlert
            properties:
              annotations:
                description: Annotations contains optional alert metadata
                properties:
                  description:
                    description: Description is a longer description of the alert
                    type: string
                  summary:
                    description: Summary is a short summary of the alert
                    type: string
                type: object
              clusterName:
                description: ClusterName is the name of the cluster this alert applies
                  to
                minLength: 1
                type: string
              clusterType:
                description: ClusterType is the type of the cluster (cassandra, kafka,
                  dse)
                enum:
                - cassandra
                - kafka
                - dse
                type: string
              connectionRef:
                description: ConnectionRef is the name of an AxonOpsConnection in
                  the same namespace.
                minLength: 1
                type: string
              content:
                description: Content is the message or phrase to match in logs
                type: string
              criticalValue:
                description: CriticalValue is the critical threshold
                type: number
              duration:
                description: Duration is how long the condition must be true to trigger
                  the alert (e.g. 15m, 1h)
                minLength: 1
                type: string
              filters:
                description: Filters apply constraints to the alert based on infrastructure
                  dimensions
                properties:
                  dc:
                    description: DataCenter filters alerts to specific data centers
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  hostId:
                    description: HostID filters alerts to specific hosts
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  rack:
                    description: Rack filters alerts to specific racks
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                type: object
              integrations:
                description: |-
                  Integrations specifies how to route alert notifications
                  DEPRECATED: This field is not implemented and is ignored by the controller.
                  Use the AxonOpsAlertRoute CRD instead for alert routing and notification configuration.
                  This field is retained for potential future use but should not be configured.
                properties:
                  overrideError:
                    description: OverrideError determines if the integration overrides
                      error-level alerts
                    type: boolean
                  overrideInfo:
                    description: OverrideInfo determines if the integration overrides
                      info-level alerts
                    type: boolean
                  overrideWarning:
                    description: OverrideWarning determines if the integration overrides
                      warning-level alerts
                    type: boolean
                  routing:
                    description: Routing is the list of routing destinations (email
                      addresses, Slack channels, etc.)
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  type:
                    description: Type is the integration type (e.g., email, slack,
                      pagerduty)
                    type: string
                type: object
              level:
                description: 'Level specifies log levels to match (comma-separated:
                  error, warning, info, debug)'
                type: string
              logType:
                description: LogType specifies the type of logs to match (e.g., system,
                  application)
                type: string
              name:
                description: Name is the human-readable name of the alert rule
                minLength: 1
                type: string
              operator:
                description: Operator is the comparison operator (>, >=, =, !=, <=,
                  <)
                enum:
                - '>'
                - '>='
                - =
                - '!='
                - <=
                - <
                type: string
              source:
                description: Source specifies the log file source path (e.g., /var/log/cassandra/system.log)
                type: string
              warningValue:
                description: WarningValue is the warning threshold
                type: number
            required:
            - clusterName
            - clusterType
            - connectionRef
            - criticalValue
            - duration
            - name
            - operator
            - warningValue
            type: object
          status:
            description: status defines the observed state of AxonOpsLogAlert
            properties:
              conditions:
                description: |-
                  Conditions represent the current state of the AxonOpsLogAlert resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Ready": the alert rule is synced with AxonOps and ready
                  - "Progressing": the alert rule is being created or updated
                  - "Failed": the alert rule failed to sync with AxonOps

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                description: LastSyncTime is the timestamp of the last successful
                  sync with AxonOps
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation of the most
                  recently observed AxonOpsLogAlert
                format: int64
                type: integer
              syncedAlertID:
                description: SyncedAlertID is the ID of the alert rule assigned by
                  AxonOps API
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
