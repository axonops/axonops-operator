---
apiVersion: v1
kind: Secret
metadata:
  name: ${AXONOPS_KAFKA_CLUSTER}-agent
  namespace: ${STRIMZI_NAMESPACE}
stringData:
  AXON_AGENT_CLUSTER_NAME: ${AXONOPS_KAFKA_CLUSTER}
  AXON_AGENT_ORG: ${AXONOPS_ORG_ID}
  AXON_AGENT_SERVER_HOST: ${AXON_AGENT_SERVER_HOST}
  AXON_AGENT_KEY: not-used
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: ${AXONOPS_KAFKA_CLUSTER}-admin
  namespace: ${STRIMZI_NAMESPACE}
  labels:
    strimzi.io/cluster: ${AXONOPS_KAFKA_CLUSTER}
spec:
  authentication:
    type: scram-sha-512

---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: ${AXONOPS_KAFKA_CLUSTER}
  namespace: ${STRIMZI_NAMESPACE}
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.1
    image: ghcr.io/axonops/strimzi/kafka:0.50.0-4.1.1-2.0.19-0.1.12
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: scram-sha-512

    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
    jvmOptions:
      javaSystemProperties:
        - name: kafka.logs.dir
          value: /var/log/kafka
    logging:
      type: inline
      loggers:
        log4j.rootLogger: "INFO, FILE"
        log4j.appender.FILE: "org.apache.log4j.RollingFileAppender"
        log4j.appender.FILE.File: "/var/log/kafka/server.log"
        log4j.appender.FILE.MaxFileSize: "10MB"
        log4j.appender.FILE.MaxBackupIndex: "5"
        log4j.appender.FILE.layout: "org.apache.log4j.PatternLayout"
        log4j.appender.FILE.layout.ConversionPattern: "[%d] %p %m (%c)%n"
        log4j.logger.axonops.io.netty: "ERROR"
  entityOperator:
    topicOperator: {} # Enables the Topic Operator
    userOperator: {}  # Optional: enables user management
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: ${AXONOPS_KAFKA_CLUSTER}-connect
  namespace: ${STRIMZI_NAMESPACE}
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.1.1
  image: ghcr.io/axonops/strimzi/kafka:0.50.0-4.1.1-2.0.19-0.1.12
  replicas: 1
  bootstrapServers: ${AXONOPS_KAFKA_CLUSTER}-kafka-bootstrap:9092
  config:
    group.id: connect-group
    config.storage.topic: connect-configs
    status.storage.topic: connect-status
    offset.storage.topic: connect-offsets
    config.storage.replication.factor: -1
    offset.storage.replication.factor: -1
    status.storage.replication.factor: -1
  template:
    connectContainer:
      env:
      - name: KAFKA_NODE_TYPE
        value: connect
      - name: AXON_AGENT_CLUSTER_NAME
        value: "${AXONOPS_KAFKA_CLUSTER}"
      - name: AXON_AGENT_ORG
        value: "${AXONOPS_ORG_ID}"
      - name: AXON_AGENT_TLS_MODE
        value: "disabled"
      - name: AXON_AGENT_SERVER_PORT
        value: "1888"
      - name: AXON_AGENT_SERVER_HOST
        value: "${AXON_AGENT_SERVER_HOST}"
      - name: AXON_AGENT_KEY
        value: "not-used"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-logging-cm
  namespace: ${STRIMZI_NAMESPACE}
data:
  log4j.properties: |
    log4j.rootLogger=INFO, FILE
    log4j.appender.FILE=org.apache.log4j.RollingFileAppender
    log4j.appender.FILE.File=/var/log/kafka/server.log
    log4j.appender.FILE.MaxFileSize=10MB
    log4j.appender.FILE.MaxBackupIndex=5
    log4j.appender.FILE.layout=org.apache.log4j.PatternLayout
    log4j.appender.FILE.layout.ConversionPattern=[%d] %p %m (%c)%n
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: ${AXONOPS_KAFKA_CLUSTER}-brokers
  namespace: ${STRIMZI_NAMESPACE}
  labels:
    strimzi.io/cluster: ${AXONOPS_KAFKA_CLUSTER}
spec:
  replicas: 1
  roles:
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0 ## AxonOps requires there is a volume with index `0`
        type: persistent-claim
        size: 1Gi
        deleteClaim: false
        class:
  template:
    kafkaContainer:
      env:
      - name: KAFKA_NODE_TYPE
        value: kraft-broker
      - name: AXON_AGENT_CLUSTER_NAME
        value: "${AXONOPS_KAFKA_CLUSTER}"
      - name: AXON_AGENT_ORG
        value: "${AXONOPS_ORG_ID}"
      - name: AXON_AGENT_TLS_MODE
        value: "disabled"
      - name: AXON_AGENT_SERVER_PORT
        value: "1888"
      - name: AXON_AGENT_SERVER_HOST
        value: "${AXON_AGENT_SERVER_HOST}"
      - name: AXON_AGENT_KEY
        value: "not-used"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: ${AXONOPS_KAFKA_CLUSTER}-controller
  namespace: ${STRIMZI_NAMESPACE}
  labels:
    strimzi.io/cluster: ${AXONOPS_KAFKA_CLUSTER}
spec:
  replicas: 1
  roles:
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 1Gi
        deleteClaim: false
        class:
        kraftMetadata: shared
  template:
    kafkaContainer:
      env:
      - name: KAFKA_NODE_TYPE
        value: kraft-controller
      - name: AXON_AGENT_CLUSTER_NAME
        value: "${AXONOPS_KAFKA_CLUSTER}"
      - name: AXON_AGENT_ORG
        value: "${AXONOPS_ORG_ID}"
      - name: AXON_AGENT_TLS_MODE
        value: "disabled"
      - name: AXON_AGENT_SERVER_PORT
        value: "1888"
      - name: AXON_AGENT_SERVER_HOST
        value: "${AXON_AGENT_SERVER_HOST}"
      - name: AXON_AGENT_KEY
        value: "not-used"
