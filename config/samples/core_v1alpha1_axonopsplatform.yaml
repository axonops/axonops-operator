apiVersion: core.axonops.com/v1alpha1
kind: AxonOpsPlatform
metadata:
  labels:
    app.kubernetes.io/name: axonops-operator
    app.kubernetes.io/managed-by: kustomize
  name: axonopsplatform-sample
  namespace: default
spec:
  # All components are enabled by default (enabled: true)
  # Set enabled: false to disable a component

  # Server component (axon-server)
  server: {}

  # TimeSeries component (axondb-timeseries)
  # - Credentials will be auto-generated unless you specify authentication
  # - TLS certificates are auto-generated via cert-manager using the configured ClusterIssuer
  # - Secret keys: AXONOPS_DB_USER, AXONOPS_DB_PASSWORD
  #
  # Optional authentication configuration:
  #   authentication:
  #     secretRef: my-secret  # Use existing secret with AXONOPS_DB_USER/AXONOPS_DB_PASSWORD keys
  #   OR
  #     username: myuser
  #     password: mypassword
  timeSeries: {}

  # Search component (axondb-search)
  # - Credentials will be auto-generated unless you specify authentication
  # - TLS certificates are auto-generated via cert-manager using the configured ClusterIssuer
  # - Secret keys: AXONOPS_SEARCH_USER, AXONOPS_SEARCH_PASSWORD
  search: {}

  # Dashboard component (axon-dash)
  dashboard: {}

  # Example: disable a component
  # dashboard:
  #   enabled: false

  # Example: constrain pods to specific nodes
  # timeSeries:
  #   nodeSelector:
  #     disktype: ssd
  # server:
  #   nodeSelector:
  #     role: infra

  # Example: hostPath storage (single-node / bare-metal, no StorageClass required)
  # See hostpath-storage-example.yaml for the full annotated example.
  # timeSeries:
  #   storageConfig: {}
  #   extraVolumes:
  #     - name: timeseries-data
  #       hostPath:
  #         path: /data/axon-timeseries
  #         type: DirectoryOrCreate
  #   extraVolumeMounts:
  #     - name: timeseries-data
  #       mountPath: /var/lib/cassandra
  #   nodeSelector:
  #     kubernetes.io/hostname: my-node
  # search:
  #   storageConfig: {}
  #   extraVolumes:
  #     - name: search-data
  #       hostPath:
  #         path: /data/axon-search
  #         type: DirectoryOrCreate
  #   extraVolumeMounts:
  #     - name: search-data
  #       mountPath: /var/lib/opensearch
  #   nodeSelector:
  #     kubernetes.io/hostname: my-node
